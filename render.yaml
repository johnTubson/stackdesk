# Render Blueprint — Git deploy via Dockerfile (not docker-compose).
# Dashboard: New → Blueprint → connect this repo, or New → Web Service → Docker.
# Docs: deploy/render/README.md

services:
  - type: web
    name: stackdesk
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /login
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:./data/local.db
      - key: HOST
        value: 0.0.0.0
      - key: SESSION_SECRET
        generateValue: true
